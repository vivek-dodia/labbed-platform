services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: labbed
      POSTGRES_USER: labbed
      POSTGRES_PASSWORD: labbed
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labbed"]
      interval: 5s
      timeout: 5s
      retries: 5

  platform:
    build:
      context: ./platform
    ports:
      - "8080:8080"
    environment:
      LABBED_DATABASE_HOST: postgres
      LABBED_AUTH_JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      LABBED_AUTH_ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@labbed.local}
      LABBED_AUTH_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy

  # Workers run on Docker hosts with privileged access.
  # For local dev, this runs alongside the platform.
  worker:
    build:
      context: ./worker
    privileged: true
    network_mode: host
    pid: host
    environment:
      LABBED_WORKER_NAME: local-worker
      LABBED_WORKER_PORT: 8081
      LABBED_WORKER_PLATFORM_URL: http://localhost:8080
      LABBED_WORKER_PLATFORM_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/netns:/var/run/netns
    depends_on:
      - platform

volumes:
  pgdata:
